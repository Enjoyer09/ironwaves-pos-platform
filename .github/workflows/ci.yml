name: CI

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  backend-checks:
    name: Backend Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Python compile check
        run: python -m compileall app

      - name: Debug tested commit and finance snippets
        run: |
          echo "GITHUB_SHA=$GITHUB_SHA"
          git rev-parse HEAD
          echo "---- backend/app/routers/finance.py (_transaction_date) ----"
          sed -n '408,420p' app/routers/finance.py
          echo "---- backend/app/services/finance_service.py (_setting_value) ----"
          sed -n '34,54p' app/services/finance_service.py
          echo "---- backend/app/services/finance_service.py (shift_cash_breakdown_from_ledger) ----"
          sed -n '228,270p' app/services/finance_service.py
          echo "---- backend/app/services/finance_service.py (mirror_posted_transaction_to_legacy_wallet) ----"
          sed -n '462,492p' app/services/finance_service.py

      - name: Run backend tests
        env:
          DATABASE_URL: "sqlite:///./ci_test.db"
          JWT_SECRET: "ci-test-secret"
          SUPERADMIN_PASSWORD: "ci-superadmin-password"
        run: python -m pytest

      - name: Migration syntax check
        env:
          DATABASE_URL: "sqlite:///./ci_test.db"
          JWT_SECRET: "ci-test-secret"
          SUPERADMIN_PASSWORD: "ci-superadmin-password"
        run: alembic upgrade head --sql > /tmp/alembic_preview.sql

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        env:
          VITE_API_BASE_URL: "https://example.invalid"
        run: npm run build

# ═══════════════════════════════════════════════════════════
# iRonWaves POS — QZ Tray "Always Allow" konfiqurasiyası
# ═══════════════════════════════════════════════════════════
#
# Bu fayl QZ Tray-in heç bir dialog göstərmədən
# iRonWaves POS sertifikatını avtomatik qəbul etməsini təmin edir.
#
# Quraşdırma:
#   Windows:  C:\Program Files\QZ Tray\qz-tray.properties
#   macOS:    /Applications/QZ Tray.app/Contents/Resources/qz-tray.properties
#             və ya: ~/Library/Application Support/QZ Tray/qz-tray.properties
#   Linux:    /opt/qz-tray/qz-tray.properties
#             və ya: ~/.config/qz-tray/qz-tray.properties

# Sertifikat faylının yolu (eyni qovluqda olmalıdır)
authcert.override=ironwaves-pos.crt

# Bütün websocket bağlantılarını avtomatik qəbul et (dialog olmadan)
security.data.enabled=false
security.file.enabled=false

# Websocket host icazəsi
websocket.allowed=*.ironwaves.store,localhost,127.0.0.1

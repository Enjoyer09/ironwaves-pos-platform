apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ironwaves-backend
  labels:
    app: ironwaves-backend
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: nginx
  rules:
  - host: api.ironwaves.store
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: ironwaves-backend
            port:
              number: 80

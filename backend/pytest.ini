[pytest]
testpaths = tests
pythonpath = .
addopts = -q
asyncio_default_fixture_loop_scope = function
markers =
    integration: real external dependency tests (e.g. PostgreSQL)
filterwarnings =
    ignore:'crypt' is deprecated and slated for removal in Python 3.13:DeprecationWarning:passlib.utils
    ignore:The configuration option "asyncio_default_fixture_loop_scope" is unset.*:pytest.PytestDeprecationWarning
